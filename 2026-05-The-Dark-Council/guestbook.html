<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Dark Council - Guestbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="js/eye.js"></script>
</head>
<body class="guestbook-page">
    <div class="bg-texture"></div>

    <div class="content">
        <!-- Interactive Eye -->
        <div class="eye-widget">
            <div id="eye-surface" class="eye-surface"></div>
            <div class="eyelids"></div>
        </div>

        <div class="forms-container">
            <!-- Comment Form -->
            <form id="comment-form" class="form-box">
                <!-- <h2>Sign</h2> -->
                <label>Name
                    <input type="text" name="name" required maxlength="80" />
                </label>
                <label>Comment
                    <textarea name="comment" rows="4" maxlength="280" required></textarea>
                </label>
                <button type="submit">Leave a Mark</button>
                <div class="comment-status" id="comment-status"></div>
            </form>

            <!-- Comment List -->
            <div id="ledger-box" class="form-box ledger-box">
                <h2><span class="engraved-text">Solstice Ceremony - 2775 NE </span></h2>
                <ul class="comment-list" id="comment-list">
                    <li style="color:#666;">Loading...</li>
                </ul>
            </div>
        </div>

        <!-- Back button -->
        <div class="back-btn-wrap">
            <a href="rsvp.html" class="back-btn">&#x2190; Return to RSVP</a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script type="module" src="js/guestbook.js"></script>
</body>
</html>
