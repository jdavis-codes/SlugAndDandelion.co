<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>The Dark Council - RSVP</title>
    <meta property="og:title" content="The Dark Council - RSVP">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/assets/banner_text.png?v=__ASSET_VERSION__">
    <meta property="og:image:type" content="image/png">
    <!-- <meta property="og:image:alt" content="The Dark Council banner"> -->
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=__ASSET_VERSION__">
    <script type="module" src="js/eye.js?v=__ASSET_VERSION__"></script>
</head>
<body class="rsvp-page">
    <div class="bg-texture"></div>

    <div class="content">
        <!-- Interactive Eye -->
        <div class="eye-widget">
            <div class="eye-banner-wrapper">
                <img src="assets/banner_text.png?v=__ASSET_VERSION__" class="eye-banner" alt="Banner" />
            </div>
            <div class="eye-banner-links">
                <a href="assets/invite.ics?v=__ASSET_VERSION__" download="invite.ics" class="banner-link left-link" aria-label="Download calendar invite"></a>
                <a href="https://maps.app.goo.gl/CU85SGmU69qftdGF7" target="_blank" rel="noopener noreferrer" class="banner-link right-link" aria-label="View on Google Maps"></a>
            </div>
            <div class="eye-core">
                <div id="eye-surface" class="eye-surface"></div>
                <div class="eyelids"></div>
            </div>
        </div>

        <div class="chamber-warning" id="chamber-warning" aria-hidden="true">
            <span>DO NOT GO WHERE YOU DO NOT BELONG</span>
        </div>

        <div class="rsvp-main">
            <div class="forms-container">
                <!-- RSVP Form -->
                <form id="rsvp-form" class="form-box">
                    <h2>RSVP 𓀠 </h2>
                    <label>Name 𓂉
                        <input type="text" name="name" required maxlength="80" />
                    </label>
                    <div class="form-row">
                        <label>Attendance 𓏎
                            <select name="attending" required>
                                <option value="yes">Yes</option>
                                <option value="maybe">Maybe</option>
                                <option value="no">No</option>
                            </select>
                        </label>
                        <label class="narrow">+ Guests 𓅺
                            <input type="number" name="guests" min="0" max="2" value="0" />
                        </label>
                    </div>
                    <label>Message 𓀥
                        <textarea name="message" rows="2" maxlength="240"></textarea>
                    </label>
                    <label>Private Message for the Council Elders 𓂈
                        <textarea name="private_message" rows="2" maxlength="500"></textarea>
                    </label>
                    <button type="submit">Submit</button>
                    <div class="rsvp-status" id="rsvp-status"></div>
                </form>

                <!-- Attendee List -->
                <div class="form-box">
                    <!-- <h2>Who's Coming</h2> -->
                    <ul class="attendee-list" id="attendee-list">
                        <li style="color:#666;"> 𓏎 Loading...</li>
                    </ul>
                </div>
            </div>

            <!-- Guestbook Button + Inner Chamber gate -->
            <div class="guestbook-btn-wrap chamber-row">
                <a href="guestbook.html" class="guestbook-btn"> 𓀡 Guestbook</a>
                <form id="chamber-form" class="chamber-form" autocomplete="off">
                    <input id="chamber-pass" name="chamber_pass" type="text"
                           placeholder="𓂀 inner chamber password"
                           aria-label="Inner chamber password"
                           autocomplete="off" spellcheck="false" />
                    <button type="submit" class="chamber-btn" aria-label="Enter chamber">enter &rarr;</button>
                </form>
            </div>
            <div id="chamber-err" class="chamber-err" role="status" aria-live="polite"></div>
        </div>
    </div>

    <script src="js/config.js?v=__ASSET_VERSION__"></script>
    <script type="module" src="js/rsvp.js?v=__ASSET_VERSION__"></script>
    <script type="module" src="js/chambers.js?v=__ASSET_VERSION__"></script>
</body>
</html>
