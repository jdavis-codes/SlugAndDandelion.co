<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Dark Council - RSVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            background-color: #111;
        }

        .bg-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/wrinkle-texture.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
            z-index: 1;
        }

        .content {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #d8d8d8;
            font-family: "Special Elite", "Courier New", monospace;
            text-align: center;
            opacity: 0;
            animation: fadeInText 3s 1s ease forwards;
            z-index: 2;
        }

        h1 {
            font-size: 3em;
            letter-spacing: 0.1em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        p {
            font-size: 1.2em;
            max-width: 600px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        @keyframes fadeIn {
            to { opacity: 0.4; }
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }

        .eye-widget {
            position: relative;
            width: 400px;
            height: 250px;
            margin: 2rem auto;
            /* Debug border to see exactly where it is */
            /* border: 1px solid red; */
        }

        .eye-surface {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; /* Provides the white of the eye for the transparent sphere */
            /* Use the SVG mask to only show the sclera/pupil inside the eye opening */
            -webkit-mask-image: url('assets/eyemaks.svg');
            -webkit-mask-size: contain;
            -webkit-mask-position: center;
            -webkit-mask-repeat: no-repeat;
            mask-image: url('assets/eyemaks.svg');
            mask-size: contain;
            mask-position: center;
            mask-repeat: no-repeat;
        }

        .eyelids {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('assets/eyelids.svg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 2;
        }
    </style>
    <script type="module" src="eye.js"></script>
</head>
<body>
    <div class="bg-texture"></div>

    <div class="content">
        <h1>Under construction</h1>
        
        <!-- Interactive Eye -->
        <div class="eye-widget">
            <div id="eye-surface" class="eye-surface"></div>
            <div class="eyelids"></div>
        </div>

        <p>The USPS is somehow faster than The Council of Darkness... Come back tomorrow</p>
    </div>
</body>
</html>
