<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dark Council - RSVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
        }

        .bg-texture {
            position: fixed;
            top: 0;
            left: 0;
                    width: 100%;
                    height: 100%;
            background-image: url('assets/wrinkle-texture.png');
            background-size: fill;
                    background-position: center center;
                    background-repeat: no-repeat;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
            z-index: 1;
        }

        .content {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #d8d8d8;
            font-family: "Special Elite", "Courier New", monospace;
            text-align: center;
            opacity: 0;
            animation: fadeInText 3s 1s ease forwards;
        }

        h1 {
            font-size: 3em;
            letter-spacing: 0.1em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        p {
            font-size: 1.2em;
            max-width: 600px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        @keyframes fadeIn {
            to { opacity: 0.4; } /* Subtle wrinkle */
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="bg-texture"></div>
    <div class="content">
        <h1>Under construction</h1>
        <p>The USPS is somehow faster than The Council of Darkness... Come back tomorrow</p>
    </div>
</body>
</html>
