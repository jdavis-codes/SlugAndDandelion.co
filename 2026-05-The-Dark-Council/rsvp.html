<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Dark Council - RSVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="eye.js"></script>
</head>
<body class="rsvp-page">
    <div class="bg-texture"></div>

    <div class="content">
        <!-- Interactive Eye -->
        <div class="eye-widget">
            <div id="eye-surface" class="eye-surface"></div>
            <div class="eyelids"></div>
        </div>

        <div class="forms-container">
            <!-- RSVP Form -->
            <form id="rsvp-form" class="form-box">
                <h2>RSVP</h2>
                <label>Name
                    <input type="text" name="name" required maxlength="80" />
                </label>
                <div class="form-row">
                    <label>Attendance
                        <select name="attending" required>
                            <option value="yes">Yes</option>
                            <option value="maybe">Maybe</option>
                            <option value="no">No</option>
                        </select>
                    </label>
                    <label class="narrow">+ Guests
                        <input type="number" name="guests" min="0" max="2" value="0" />
                    </label>
                </div>
                <label>Message
                    <textarea name="message" rows="2" maxlength="240"></textarea>
                </label>
                <label>Secret msg to the Council
                    <textarea name="private_message" rows="2" maxlength="500"></textarea>
                </label>
                <button type="submit">Submit</button>
                <div class="rsvp-status" id="rsvp-status"></div>
            </form>

            <!-- Attendee List -->
            <div class="form-box">
                <!-- <h2>Who's Coming</h2> -->
                <ul class="attendee-list" id="attendee-list">
                    <li style="color:#666;">Loading...</li>
                </ul>
            </div>
        </div>

        <!-- Guestbook Button -->
        <div class="guestbook-btn-wrap">
            <a href="guestbook.html" class="guestbook-btn">&#x1F56E; Guestbook</a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script type="module" src="js/rsvp.js"></script>
</body>
</html>
